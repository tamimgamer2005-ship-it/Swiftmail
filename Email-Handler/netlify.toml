[build]
  command = "pnpm --filter @workspace/swiftmail run build"
  publish = "artifacts/swiftmail/dist"
  functions = "artifacts/swiftmail/netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[redirects]]
  from = "/api/mailtm/*"
  to = "/.netlify/functions/mailtm"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
